<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>穂乃味 タイムカード</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#0a0a0a;color:#fff;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh;}
  .wrap{max-width:400px;margin:0 auto;padding:20px 16px 40px;}
  h1{font-size:2rem;font-weight:900;letter-spacing:-1px;}
  .clock{font-size:2.2rem;font-family:monospace;color:#d1d5db;}
  .date{font-size:.85rem;color:#6b7280;margin-top:2px;}
  .label{font-size:.75rem;font-weight:700;letter-spacing:.1em;color:#6b7280;text-align:center;margin-bottom:10px;}
  button{border:none;border-radius:14px;font-weight:700;cursor:pointer;transition:transform .1s,opacity .2s;user-select:none;font-family:inherit;}
  button:active{transform:scale(.94);}
  .yomi-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
  .yomi-tab{padding:8px 12px;border-radius:10px;font-size:.9rem;font-weight:700;}
  .yomi-on{background:#d97706;color:#fff;}
  .yomi-off{background:#1f2937;color:#9ca3af;}
  .btn-staff{background:#1f2937;color:#fff;padding:22px 10px;font-size:1.5rem;font-weight:900;width:100%;display:block;margin-bottom:12px;}
  .btn-staff:active{background:#d97706;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
  .btn-punch{padding:22px 10px;font-size:1.1rem;font-weight:900;color:#fff;line-height:1.4;}
  .btn-punch:disabled{opacity:.22;cursor:not-allowed;}
  .btn-in{background:#166534;} .btn-out{background:#991b1b;}
  .btn-bs{background:#92400e;} .btn-be{background:#1e3a8a;}
  .btn-admin{background:#111827;color:#6b7280;font-size:.85rem;padding:12px;width:100%;border-radius:12px;margin-top:8px;}
  .btn-back{background:transparent;color:#6b7280;font-size:.85rem;padding:6px 0;text-align:left;margin-bottom:16px;}
  .btn-pin{background:#1f2937;color:#fff;padding:18px;font-size:1.4rem;font-weight:700;border-radius:14px;}
  .btn-pin-enter{background:#d97706;color:#fff;padding:18px;font-size:1.2rem;font-weight:700;border-radius:14px;}
  .btn-pin-clear{background:#1f2937;color:#9ca3af;padding:18px;font-size:1rem;border-radius:14px;}
  .pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px;}
  .pin-display{font-size:2.5rem;font-family:monospace;text-align:center;letter-spacing:.3em;min-height:52px;line-height:52px;margin-bottom:10px;}
  .msg-ok{background:#064e3b;border:1px solid #10b981;border-radius:14px;padding:14px;text-align:center;font-size:1.05rem;font-weight:700;margin-bottom:16px;}
  .history{background:#111827;border-radius:16px;padding:16px;}
  .hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .hist-label{color:#9ca3af;font-size:.8rem;font-weight:700;}
  .hist-worked{color:#fbbf24;font-size:.8rem;font-weight:700;}
  .hist-row{display:flex;justify-content:space-between;font-size:.85rem;padding:7px 0;border-bottom:1px solid #1f2937;}
  .hist-row:last-child{border-bottom:none;}
  .c-in{color:#4ade80;} .c-out{color:#f87171;} .c-brk{color:#fbbf24;}
  .tab-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .tab-btn{padding:8px 14px;border-radius:10px;font-size:.82rem;font-weight:700;}
  .tab-on{background:#d97706;color:#fff;}
  .tab-off{background:#1f2937;color:#9ca3af;}
  .admin-card{background:#111827;border-radius:16px;padding:16px;margin-bottom:14px;}
  .admin-title{font-weight:700;font-size:1rem;margin-bottom:12px;}
  select,input{background:#1f2937;color:#fff;border:1px solid #374151;border-radius:10px;padding:8px 12px;font-size:.85rem;font-family:inherit;outline:none;}
  input:focus{border-color:#d97706;}
  .tbl-head{display:grid;grid-template-columns:90px 80px 75px 55px;font-size:.7rem;font-weight:700;color:#6b7280;padding-bottom:8px;border-bottom:1px solid #1f2937;gap:4px;}
  .tbl-row{display:grid;grid-template-columns:90px 80px 75px 55px;font-size:.75rem;padding:7px 0;border-bottom:1px solid #0f172a;gap:4px;}
  .btn-export{background:#d97706;color:#fff;padding:14px;font-size:1rem;font-weight:700;border-radius:12px;width:100%;}
  .sum-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1f2937;font-size:.85rem;align-items:center;}
  .staff-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:.85rem;border-bottom:1px solid #0f172a;}
  .btn-del{background:transparent;color:#4b5563;font-size:.75rem;border-radius:6px;padding:3px 8px;}
  .empty{color:#4b5563;font-size:.85rem;text-align:center;padding:20px 0;}
  .center{text-align:center;}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const TYPE_LABEL={clockIn:"出勤",clockOut:"退勤",breakStart:"休憩開始",breakEnd:"休憩終了"};
const ADMIN_PIN="1234";
const YOMI_ROWS=[
  {label:"すべて",r:null},
  {label:"ア",r:["ぁ","お"]},{label:"カ",r:["か","ご"]},{label:"サ",r:["さ","ぞ"]},
  {label:"タ",r:["た","ど"]},{label:"ナ",r:["な","の"]},{label:"ハ",r:["は","ぽ"]},
  {label:"マ",r:["ま","も"]},{label:"ヤ",r:["や","よ"]},{label:"ラ",r:["ら","ろ"]},
  {label:"ワ",r:["わ","ん"]},
];
const DEF_STAFF=[
  {name:"谷村",yomi:"たにむら"},{name:"茂野",yomi:"しげの"},{name:"吉田",yomi:"よしだ"},
  {name:"中島",yomi:"なかしま"},{name:"大城",yomi:"おおしろ"},{name:"谷口",yomi:"たにぐち"},
  {name:"坂下",yomi:"さかした"},{name:"久木原",yomi:"くきはら"},{name:"藤原",yomi:"ふじわら"},
];

function loadData(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function saveData(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

let screen="home", staffName=null;
let records=loadData("tc5_records",[]);
let staffList=loadData("tc5_staff",DEF_STAFF);
let punchMsg=null,punchTimer=null,pinInput="",pinError=false,pinTimer=null;
let adminTab="records",yomiTab="すべて";
let selMonth=(()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;})();
let newName="",newYomi="";

function pad(n){return String(n).padStart(2,"0");}
function fmtDate(d){return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())}`;}
function fmtDateKey(d){return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function fmtTime(d){return `${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function fmtTimeSec(d){return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;}
function monthKey(iso){return iso.substring(0,7);}

function filteredStaff(){
  const row=YOMI_ROWS.find(r=>r.label===yomiTab)||YOMI_ROWS[0];
  return staffList.filter(s=>!row.r||(s.yomi>=row.r[0]&&s.yomi<=row.r[1]))
    .sort((a,b)=>a.yomi.localeCompare(b.yomi,"ja"));
}

function calcWork(rs){
  const s=[...rs].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
  let tot=0,brk=0,cin=null,bsin=null;
  for(const r of s){
    if(r.type==="clockIn")cin=new Date(r.timestamp);
    if(r.type==="clockOut"&&cin){tot+=new Date(r.timestamp)-cin;cin=null;}
    if(r.type==="breakStart")bsin=new Date(r.timestamp);
    if(r.type==="breakEnd"&&bsin){brk+=new Date(r.timestamp)-bsin;bsin=null;}
  }
  const net=tot-brk;
  if(net<=0)return null;
  return `${Math.floor(net/3600000)}:${pad(Math.floor((net%3600000)/60000))}`;
}

function todayRecs(){
  const dk=fmtDateKey(new Date());
  return records.filter(r=>r.staff===staffName&&r.date===dk)
    .sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));
}

function render(){
  const now=new Date();
  const app=document.getElementById("app");

  if(screen==="home"){
    const list=filteredStaff();
    app.innerHTML=`
      <div class="center" style="padding-top:16px;margin-bottom:20px;">
        <div style="color:#d97706;font-size:.75rem;font-weight:700;letter-spacing:.15em;margin-bottom:4px;">株式会社 穂乃味</div>
        <h1>勤怠打刻</h1>
        <div class="clock" style="margin-top:10px;" id="clk">${fmtTimeSec(now)}</div>
        <div class="date">${fmtDate(now)}</div>
      </div>
      <div class="label">スタッフを選択してください</div>
      <div class="yomi-tabs">
        ${YOMI_ROWS.map(r=>`<button class="yomi-tab ${yomiTab===r.label?"yomi-on":"yomi-off"}" data-yt="${r.label}">${r.label}</button>`).join("")}
      </div>
      ${list.length?list.map(s=>`<button class="btn-staff" data-s="${s.name}">${s.name}</button>`).join(""):'<div class="empty">該当するスタッフがいません</div>'}
      <button class="btn-admin" id="btn-admin">管理者メニュー</button>
    `;
    document.querySelectorAll("[data-yt]").forEach(b=>b.onclick=()=>{yomiTab=b.dataset.yt;render();});
    document.querySelectorAll("[data-s]").forEach(b=>b.onclick=()=>{staffName=b.dataset.s;screen="punch";render();});
    document.getElementById("btn-admin").onclick=()=>{screen="adminPin";render();};
    return;
  }

  if(screen==="punch"){
    const tr=todayRecs();
    const last=tr.length?tr[tr.length-1].type:null;
    const ci=!last||last==="clockOut",co=last==="clockIn"||last==="breakEnd";
    const cbs=last==="clockIn"||last==="breakEnd",cbe=last==="breakStart";
    const worked=calcWork(tr);
    app.innerHTML=`
      <button class="btn-back" id="btn-back">← スタッフ選択に戻る</button>
      <div class="center" style="margin-bottom:20px;">
        <div style="font-size:3rem;font-weight:900;letter-spacing:-1px;">${staffName}</div>
        <div class="clock" id="clk" style="margin-top:6px;">${fmtTimeSec(now)}</div>
        <div class="date">${fmtDate(now)}</div>
      </div>
      ${punchMsg?`<div class="msg-ok">✅ ${punchMsg}</div>`:""}
      <div class="grid2" style="margin-bottom:24px;">
        <button class="btn-punch btn-in"  data-type="clockIn"    ${ci ?"":"disabled"}>🟢<br>出　勤</button>
        <button class="btn-punch btn-out" data-type="clockOut"   ${co ?"":"disabled"}>🔴<br>退　勤</button>
        <button class="btn-punch btn-bs"  data-type="breakStart" ${cbs?"":"disabled"}>☕<br>休憩開始</button>
        <button class="btn-punch btn-be"  data-type="breakEnd"   ${cbe?"":"disabled"}>▶<br>休憩終了</button>
      </div>
      <div class="history">
        <div class="hist-header">
          <span class="hist-label">本日の打刻履歴</span>
          ${worked?`<span class="hist-worked">実働 ${worked}</span>`:""}
        </div>
        ${tr.length?tr.map(r=>`<div class="hist-row"><span class="${r.type==="clockIn"?"c-in":r.type==="clockOut"?"c-out":"c-brk"}">${TYPE_LABEL[r.type]}</span><span style="font-family:monospace;">${r.time}</span></div>`).join(""):'<div class="empty" style="padding:12px 0;">まだ打刻がありません</div>'}
      </div>
    `;
    document.getElementById("btn-back").onclick=()=>{staffName=null;screen="home";render();};
    document.querySelectorAll("[data-type]").forEach(btn=>{
      if(!btn.disabled) btn.onclick=()=>{
        const d=new Date();
        records.push({id:`${Date.now()}`,staff:staffName,type:btn.dataset.type,
          date:fmtDateKey(d),time:fmtTime(d),timestamp:d.toISOString()});
        saveData("tc5_records",records);
        punchMsg=`${TYPE_LABEL[btn.dataset.type]}　${fmtTimeSec(d)}`;
        if(punchTimer)clearTimeout(punchTimer);
        punchTimer=setTimeout(()=>{punchMsg=null;render();},3500);
        render();
      };
    });
    return;
  }

  if(screen==="adminPin"){
    app.innerHTML=`
      <div class="center" style="padding-top:40px;margin-bottom:28px;">
        <div style="font-size:1.6rem;font-weight:900;">管理者認証</div>
        <div style="color:#6b7280;font-size:.85rem;margin-top:4px;">PINを入力してください</div>
      </div>
      <div class="pin-display">${pinInput?"●".repeat(pinInput.length):'<span style="color:#374151">────</span>'}</div>
      ${pinError?'<div style="color:#f87171;text-align:center;font-size:.85rem;margin-bottom:10px;">PINが違います</div>':""}
      <div class="pin-grid">
        ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="btn-pin" data-n="${n}">${n}</button>`).join("")}
        <button class="btn-pin-clear" id="pin-c">C</button>
        <button class="btn-pin" data-n="0">0</button>
        <button class="btn-pin-enter" id="pin-ok">→</button>
      </div>
      <button class="btn-admin" style="margin-top:8px;" id="pin-cancel">キャンセル</button>
    `;
    document.querySelectorAll("[data-n]").forEach(b=>b.onclick=()=>{if(pinInput.length<6){pinInput+=b.dataset.n;render();}});
    document.getElementById("pin-c").onclick=()=>{pinInput="";render();};
    document.getElementById("pin-ok").onclick=()=>{
      if(pinInput===ADMIN_PIN){screen="admin";adminTab="records";pinInput="";render();}
      else{pinError=true;pinInput="";render();if(pinTimer)clearTimeout(pinTimer);pinTimer=setTimeout(()=>{pinError=false;render();},1800);}
    };
    document.getElementById("pin-cancel").onclick=()=>{pinInput="";screen="home";render();};
    return;
  }

  if(screen==="admin"){
    const months=[...new Set(records.map(r=>monthKey(r.timestamp)))].sort().reverse();
    if(!months.includes(selMonth))months.unshift(selMonth);
    const mRecs=records.filter(r=>monthKey(r.timestamp)===selMonth).sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
    let tc="";

    if(adminTab==="records"){
      tc=`<div class="admin-card">
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
          <select id="sel-month">${months.map(m=>`<option value="${m}"${m===selMonth?" selected":""}>${m}</option>`).join("")}</select>
          <span style="color:#6b7280;font-size:.8rem;align-self:center;">${mRecs.length}件</span>
        </div>
        ${mRecs.length?`<div class="tbl-head"><span>日付</span><span>氏名</span><span>種別</span><span>時刻</span></div>`
          +mRecs.map(r=>`<div class="tbl-row"><span style="color:#6b7280;font-size:.7rem;">${r.date}</span><span style="font-weight:700;">${r.staff}</span><span class="${r.type==="clockIn"?"c-in":r.type==="clockOut"?"c-out":"c-brk"}">${TYPE_LABEL[r.type]}</span><span style="font-family:monospace;">${r.time}</span></div>`).join("")
          :'<div class="empty">データがありません</div>'}
      </div>`;
    }

    if(adminTab==="export"){
      const snames=[...new Set(mRecs.map(r=>r.staff))].sort();
      const toHM=ms=>{if(ms<=0)return"0:00";return`${Math.floor(ms/3600000)}:${pad(Math.floor((ms%3600000)/60000))}`;};
      const calcMs=rs=>{const s=[...rs].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));let tot=0,brk=0,cin=null,bsin=null;for(const r of s){if(r.type==="clockIn")cin=new Date(r.timestamp);if(r.type==="clockOut"&&cin){tot+=new Date(r.timestamp)-cin;cin=null;}if(r.type==="breakStart")bsin=new Date(r.timestamp);if(r.type==="breakEnd"&&bsin){brk+=new Date(r.timestamp)-bsin;bsin=null;}}return Math.max(0,tot-brk);};
      const sumHTML=snames.length?snames.map(nm=>{
        const sr=mRecs.filter(r=>r.staff===nm);
        const days=[...new Set(sr.filter(r=>r.type==="clockIn").map(r=>r.date))];
        let ms=0;for(const dk of days)ms+=calcMs(sr.filter(r=>r.date===dk));
        return`<div class="sum-row"><span style="font-weight:700;">${nm}</span><span style="color:#9ca3af;font-size:.78rem;">${days.length}日</span><span style="color:#fbbf24;font-family:monospace;">${toHM(ms)}</span></div>`;
      }).join(""):'<div class="empty">データがありません</div>';
      tc=`<div class="admin-card">
          <div class="admin-title">月別 CSV エクスポート</div>
          <select id="sel-month" style="width:100%;margin-bottom:10px;">${months.map(m=>`<option value="${m}"${m===selMonth?" selected":""}>${m}</option>`).join("")}</select>
          <div style="color:#6b7280;font-size:.82rem;margin-bottom:12px;">打刻件数：${mRecs.length}件</div>
          <button class="btn-export" id="btn-csv">📥　CSV ダウンロード</button>
          <div style="color:#4b5563;font-size:.72rem;margin-top:8px;">形式：氏名・実働時間・出勤日数</div>
        </div>
        <div class="admin-card"><div class="admin-title">スタッフ別サマリー</div>${sumHTML}</div>`;
    }

    if(adminTab==="staff"){
      const sorted=[...staffList].sort((a,b)=>a.yomi.localeCompare(b.yomi,"ja"));
      tc=`<div class="admin-card">
          <div class="admin-title">スタッフ追加</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            <input id="inp-name" type="text" placeholder="氏名（例：山田太郎）" value="${newName}">
            <input id="inp-yomi" type="text" placeholder="よみがな（例：やまだたろう）" value="${newYomi}">
            <button class="btn-export" id="btn-add">追加</button>
          </div>
        </div>
        <div class="admin-card">
          <div class="admin-title">スタッフ一覧（${staffList.length}名）</div>
          ${sorted.length?sorted.map(s=>`<div class="staff-row"><span>${s.name}<span style="color:#6b7280;font-size:.78rem;margin-left:8px;">${s.yomi}</span></span><button class="btn-del" data-sn="${s.name}">削除</button></div>`).join(""):'<div class="empty">未登録</div>'}
        </div>`;
    }

    app.innerHTML=`
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div style="font-size:1.1rem;font-weight:900;">管理者メニュー</div>
        <button class="btn-del" id="btn-close" style="color:#9ca3af;font-size:.85rem;background:#111827;padding:6px 14px;border-radius:10px;">← 閉じる</button>
      </div>
      <div class="tab-row">
        <button class="tab-btn ${adminTab==="records"?"tab-on":"tab-off"}" data-tab="records">勤怠一覧</button>
        <button class="tab-btn ${adminTab==="export" ?"tab-on":"tab-off"}" data-tab="export">CSV出力</button>
        <button class="tab-btn ${adminTab==="staff"  ?"tab-on":"tab-off"}" data-tab="staff">スタッフ管理</button>
      </div>
      ${tc}
    `;
    document.getElementById("btn-close").onclick=()=>{screen="home";render();};
    document.querySelectorAll("[data-tab]").forEach(b=>b.onclick=()=>{adminTab=b.dataset.tab;render();});
    const sm=document.getElementById("sel-month");
    if(sm)sm.onchange=()=>{selMonth=sm.value;render();};

    const csvBtn=document.getElementById("btn-csv");
    if(csvBtn)csvBtn.onclick=()=>{
      const mRe=records.filter(r=>monthKey(r.timestamp)===selMonth);
      const snames=[...new Set(mRe.map(r=>r.staff))].sort();
      const toHM=ms=>{if(ms<=0)return"0:00";return`${Math.floor(ms/3600000)}:${pad(Math.floor((ms%3600000)/60000))}`;};
      const calcMs=rs=>{const s=[...rs].sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp));let tot=0,brk=0,cin=null,bsin=null;for(const r of s){if(r.type==="clockIn")cin=new Date(r.timestamp);if(r.type==="clockOut"&&cin){tot+=new Date(r.timestamp)-cin;cin=null;}if(r.type==="breakStart")bsin=new Date(r.timestamp);if(r.type==="breakEnd"&&bsin){brk+=new Date(r.timestamp)-bsin;bsin=null;}}return Math.max(0,tot-brk);};
      const header=["氏名","年月","総実働時間","総出勤日数"].join(",");
      const rows=snames.map(nm=>{
        const sr=mRe.filter(r=>r.staff===nm);
        const allD=[...new Set(sr.filter(r=>r.type==="clockIn").map(r=>r.date))];
        let ms=0;for(const dk of allD)ms+=calcMs(sr.filter(r=>r.date===dk));
        return[nm,selMonth,toHM(ms),allD.length].join(",");
      });
      const bom="\uFEFF";
      const blob=new Blob([bom+header+"\n"+rows.join("\n")],{type:"text/csv;charset=utf-8;"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");a.href=url;a.download=`穂乃味_勤怠_${selMonth}.csv`;a.click();
      URL.revokeObjectURL(url);
    };

    const inpName=document.getElementById("inp-name");
    const inpYomi=document.getElementById("inp-yomi");
    if(inpName)inpName.oninput=()=>{newName=inpName.value;};
    if(inpYomi)inpYomi.oninput=()=>{newYomi=inpYomi.value;};
    const addBtn=document.getElementById("btn-add");
    if(addBtn)addBtn.onclick=()=>{
      const n=(inpName?.value||"").trim(),y=(inpYomi?.value||"").trim();
      if(!n||!y)return;
      if(staffList.find(s=>s.name===n))return;
      staffList.push({name:n,yomi:y});
      saveData("tc5_staff",staffList);newName="";newYomi="";render();
    };
    document.querySelectorAll("[data-sn]").forEach(b=>b.onclick=()=>{
      staffList=staffList.filter(s=>s.name!==b.dataset.sn);
      saveData("tc5_staff",staffList);render();
    });
    return;
  }
}

setInterval(()=>{
  if(screen==="home"||screen==="punch"){
    const el=document.getElementById("clk");
    if(el)el.textContent=fmtTimeSec(new Date());
  }
},1000);

render();
</script>

<script>
// ===== Firebase REST API設定 =====
var FB_URL = "https://honomi-timecard-default-rtdb.asia-southeast1.firebasedatabase.app/honomi";

function saveToFirebase(key, val) {
  fetch(FB_URL + "/" + key + ".json", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(val)
  }).catch(function(e){console.error("FB save error:", e);});
}

function loadFromFirebase(callback) {
  fetch(FB_URL + ".json")
    .then(function(r){return r.json();})
    .then(function(data){callback(data||{});})
    .catch(function(e){console.error("FB load error:", e);callback({});});
}
function listenFirebase() {
  // 10秒ごとにポーリングして同期
  setInterval(function(){
    if(screen!=="admin" && screen!=="staffDetail") return;
    fetch(FB_URL + "/tc5_records.json")
      .then(function(r){return r.json();})
      .then(function(val){
        if(val){
          var arr=Array.isArray(val)?val:Object.values(val);
          if(JSON.stringify(arr)!==JSON.stringify(records)){
            records=arr;
            localStorage.setItem("tc5_records",JSON.stringify(records));
            render();
          }
        }
      }).catch(function(){});
    fetch(FB_URL + "/tc5_approvals.json")
      .then(function(r){return r.json();})
      .then(function(val){
        if(val && JSON.stringify(val)!==JSON.stringify(approvals)){
          approvals=val;
          localStorage.setItem("tc5_approvals",JSON.stringify(approvals));
          render();
        }
      }).catch(function(){});
  }, 10000);
}
</script>

<body>
<div class="wrap" id="app"></div>
<script>
// ===== 定数 =====
const TYPE_LABEL={clockIn:"出勤",clockOut:"退勤",breakStart:"休憩開始",breakEnd:"休憩終了"};
var ADMIN_PIN=localStorage.getItem("tc_admin_pin")||""; // Firebaseのconfig/adminPinから読み込む
const VALID_TOKENS={
  "nanairo1214":"ナナイロ",
  "kokora1214":"ココラ",
  "harvest1214":"ハーベスト",
  "miuge-kaizuka1214":"ミュゲ貝塚",
  "miuge-haruki1214":"ミュゲ春木"
};
var urlToken=(new URLSearchParams(location.search).get("token"))||"";
var tokenValid=Object.prototype.hasOwnProperty.call(VALID_TOKENS,urlToken);
var facilityName=VALID_TOKENS[urlToken]||"";
const YOMI_ROWS=[
  {label:"すべて",r:null},
  {label:"ア",r:["ぁ","お"]},{label:"カ",r:["か","ご"]},{label:"サ",r:["さ","ぞ"]},
  {label:"タ",r:["た","ど"]},{label:"ナ",r:["な","の"]},{label:"ハ",r:["は","ぽ"]},
  {label:"マ",r:["ま","も"]},{label:"ヤ",r:["や","よ"]},{label:"ラ",r:["ら","ろ"]},
  {label:"ワ",r:["わ","ん"]},
];
const DEF_STAFF=[
  {name:"谷村",yomi:"たにむら"},{name:"茂野",yomi:"しげの"},{name:"吉田",yomi:"よしだ"},
  {name:"中島",yomi:"なかしま"},{name:"大城",yomi:"おおしろ"},{name:"谷口",yomi:"たにぐち"},
  {name:"坂下",yomi:"さかした"},{name:"久木原",yomi:"くきはら"},{name:"藤原",yomi:"ふじわら"},
];

// ===== ユーティリティ =====
function pad(n){return String(n).padStart(2,"0");}
function fmtDate(d){return d.getFullYear()+"/"+pad(d.getMonth()+1)+"/"+pad(d.getDate());}
function fmtDateKey(d){return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());}
function fmtTime(d){return pad(d.getHours())+":"+pad(d.getMinutes());}
function fmtTimeSec(d){return pad(d.getHours())+":"+pad(d.getMinutes())+":"+pad(d.getSeconds());}
function monthKey(iso){return iso.substring(0,7);}
function toHM(ms){if(ms<=0)return"";return Math.floor(ms/3600000)+":"+pad(Math.floor((ms%3600000)/60000));}
function calcTenure(hireDateStr){
  if(!hireDateStr)return"";
  var h=new Date(hireDateStr),n=new Date();
  var y=n.getFullYear()-h.getFullYear(),m=n.getMonth()-h.getMonth();
  if(m<0){y--;m+=12;}
  if(y<0)return"入社前";
  if(y===0)return m+"ヶ月";
  return y+"年"+(m>0?m+"ヶ月":"");
}
function calcMs(rs){
  var s=rs.slice().sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
  var tot=0,brk=0,cin=null,bsin=null;
  for(var i=0;i<s.length;i++){
    var r=s[i];
    if(r.type==="clockIn")cin=new Date(r.timestamp);
    if(r.type==="clockOut"&&cin){tot+=new Date(r.timestamp)-cin;cin=null;}
    if(r.type==="breakStart")bsin=new Date(r.timestamp);
    if(r.type==="breakEnd"&&bsin){brk+=new Date(r.timestamp)-bsin;bsin=null;}
  }
  return Math.max(0,tot-brk);
}

// ===== ストレージ =====
function loadData(k,d){try{var v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function saveData(k,v){
  try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}
  // Firebaseにも同期
  saveToFirebase(k, v);
}

// ===== 状態 =====
var screen="home",staffName=null;
var records=loadData("tc5_records",[]);
var staffList=loadData("tc5_staff",DEF_STAFF);
var staffPins=loadData("tc5_pins",{});  // スタッフPIN管理
var punchMsg=null,punchTimer=null;
var pinInput="",pinError=false,pinTimer=null;
var staffPinInput="",staffPinError=false,staffPinConfirm="",staffPinStep=1;
var adminTab="records",yomiTab="すべて";
var today=new Date();
var selMonth=today.getFullYear()+"-"+pad(today.getMonth()+1);
var selDate=fmtDateKey(today);
var approvals=loadData("tc5_approvals",{});
var newLastName="",newFirstName="",newLastYomi="",newFirstYomi="",newHireDate="";
var selStaffDetail=null;
var staffHrmTab="在籍中";
var csvPreviewType=""; // "daily" or "monthly"
var masterDepts=loadData("tc_master_depts",[]);
var masterLocs=loadData("tc_master_locs",[]);
if(!masterDepts.length){masterDepts=["調理","調理補助","事務","介護","その他"];}
if(!masterLocs.length){masterLocs=["ナナイロ","ココラ","ハーベスト","ミュゲ貝塚","ミュゲ春木","春木"];}

function filteredStaff(){
  var row=YOMI_ROWS.find(function(r){return r.label===yomiTab;})||YOMI_ROWS[0];
  return staffList.filter(function(s){
    // 退職・休職は打刻画面に出さない
    if(s.status==="退職"||s.status==="休職")return false;
    return !row.r||(s.yomi>=row.r[0]&&s.yomi<=row.r[1]);
  }).sort(function(a,b){return a.yomi.localeCompare(b.yomi,"ja");});
}

// ===== レンダリング =====
function render(){
  var now=new Date();
  var app=document.getElementById("app");
  app.className=(screen==="admin"||screen==="csvPreview")?"wrap admin-mode":"wrap";

  // ── ホーム ──
  if(screen==="home"){
    if(!tokenValid){
      app.innerHTML='<div class="center" style="padding-top:80px;padding-bottom:24px;">'
        +'<div style="font-size:3.5rem;margin-bottom:16px;">🔒</div>'
        +'<div style="font-size:1.2rem;font-weight:900;color:#dc2626;margin-bottom:10px;">このURLからは打刻できません</div>'
        +'<div style="font-size:.85rem;color:#9ca3af;">正しい施設URLをご利用ください</div>'
        +'</div>'
        +'<button class="btn-admin" onclick="goPin()">管理者メニュー</button>';
      return;
    }
    var list=filteredStaff();
    var tabsHTML=YOMI_ROWS.map(function(r){
      return '<button class="yomi-tab '+(yomiTab===r.label?"yomi-on":"yomi-off")+'" onclick="setYomi(\''+r.label+'\')">'+r.label+'</button>';
    }).join("");
    var staffHTML=list.length?list.map(function(s){
      return '<button class="btn-staff" onclick="selStaff(\''+s.name+'\')">'+s.name+'</button>';
    }).join(""):'<div class="empty" style="grid-column:span 2">該当なし</div>';
    app.innerHTML='<div class="center" style="margin-bottom:10px;padding-top:4px;">'
      +'<div class="date-disp" id="dt">'+fmtDate(now)+'</div>'
      +'<div class="clock" id="clk">'+fmtTimeSec(now)+'</div>'
      +'</div>'
      +'<div class="label">スタッフを選択してください</div>'
      +'<div class="yomi-tabs">'+tabsHTML+'</div>'
      +'<div class="staff-grid">'+staffHTML+'</div>'
      +'<button class="btn-admin" onclick="goPin()">管理者メニュー</button>';
    return;
  }

  // ── スタッフPIN認証 ──
  if(screen==="staffPin"){
    var dots=staffPinInput?'●'.repeat(staffPinInput.length):'<span style="color:#d1d5db">────</span>';
    app.innerHTML='<button class="btn-back" onclick="goHome()">← もどる</button>'
      +'<div class="center" style="padding-top:20px;margin-bottom:24px;">'
      +'<div style="font-size:2.5rem;font-weight:900;margin-bottom:4px;">'+staffName+'</div>'
      +'<div style="color:#9ca3af;font-size:.9rem;">PINを入力してください</div>'
      +'</div>'
      +'<div class="pin-display">'+dots+'</div>'
      +(staffPinError?'<div style="color:#dc2626;text-align:center;font-size:.9rem;margin-bottom:10px;">PINが違います</div>':"")
      +'<div class="pin-grid">'
      +[1,2,3,4,5,6,7,8,9].map(function(n){return'<button class="btn-pin" onclick="sTap('+n+')">'+n+'</button>';}).join("")
      +'<button class="btn-pin-clear" onclick="sTap(\'C\')">C</button>'
      +'<button class="btn-pin" onclick="sTap(0)">0</button>'
      +'<button class="btn-pin-enter" onclick="sOk()">→</button>'
      +'</div>';
    return;
  }

  // ── スタッフPIN新規登録 ──
  if(screen==="staffPinNew"){
    var isConfirm=staffPinStep===2;
    var cur=isConfirm?staffPinConfirm:staffPinInput;
    var dots2=cur?'●'.repeat(cur.length):'<span style="color:#d1d5db">────</span>';
    app.innerHTML='<button class="btn-back" onclick="goHome()">← もどる</button>'
      +'<div class="center" style="padding-top:20px;margin-bottom:24px;">'
      +'<div style="font-size:2.5rem;font-weight:900;margin-bottom:4px;">'+staffName+'</div>'
      +'<div style="background:#fef3c7;border-radius:10px;padding:10px 16px;margin-bottom:8px;font-size:.88rem;color:#92400e;">🔑 初回ログインです。<br>4桁のPINを設定してください。</div>'
      +'<div style="color:#9ca3af;font-size:.88rem;">'+(isConfirm?"もう一度入力してください（確認）":"PINを入力してください（1回目）")+'</div>'
      +'</div>'
      +'<div class="pin-display">'+dots2+'</div>'
      +(staffPinError?'<div style="color:#dc2626;text-align:center;font-size:.9rem;margin-bottom:10px;">PINが一致しません。やり直してください</div>':"")
      +'<div class="pin-grid">'
      +[1,2,3,4,5,6,7,8,9].map(function(n){return'<button class="btn-pin" onclick="sNewTap('+n+')">'+n+'</button>';}).join("")
      +'<button class="btn-pin-clear" onclick="sNewTap(\'C\')">C</button>'
      +'<button class="btn-pin" onclick="sNewTap(0)">0</button>'
      +'<button class="btn-pin-enter" onclick="sNewOk()">→</button>'
      +'</div>';
    return;
  }
  if(screen==="punch"){
    var dk=fmtDateKey(now);
    var tr=records.filter(function(r){return r.staff===staffName&&r.date===dk&&!r.deleted;})
      .sort(function(a,b){return new Date(a.timestamp)-new Date(b.timestamp);});
    var last=tr.length?tr[tr.length-1].type:null;
    var ci=!last||last==="clockOut";
    var co=last==="clockIn"||last==="breakEnd";
    var cbs=last==="clockIn"||last==="breakEnd";
    var cbe=last==="breakStart";
    var worked=toHM(calcMs(tr));
    var histHTML=tr.length?tr.map(function(r){
      return '<div class="hist-row"><span class="'+(r.type==="clockIn"?"c-in":r.type==="clockOut"?"c-out":"c-brk")+'">'+TYPE_LABEL[r.type]+'</span><span style="font-family:monospace;">'+r.time+'</span></div>';
    }).join(""):'<div class="empty" style="padding:12px 0;">まだ打刻がありません</div>';
    app.innerHTML='<button class="btn-back" onclick="goHome()">← もどる</button>'
      +'<div class="center" style="margin-bottom:16px;padding-top:4px;">'
      +'<div style="font-size:3rem;font-weight:900;letter-spacing:-1px;">'+staffName+'</div>'
      +'<div class="clock" id="clk" style="margin-top:6px;">'+fmtTimeSec(now)+'</div>'
      +'<div class="date-disp">'+fmtDate(now)+'</div>'
      +'</div>'
      +(punchMsg
        ?'<div style="text-align:center;padding:36px 20px;">'
          +'<div style="font-size:3.5rem;margin-bottom:12px;">✅</div>'
          +'<div style="font-size:1.2rem;font-weight:900;color:#059669;">打刻完了</div>'
          +'<div style="font-size:.95rem;color:#374151;margin-top:8px;font-weight:700;">'+punchMsg+'</div>'
          +'<div style="font-size:.78rem;color:#9ca3af;margin-top:18px;">まもなく画面が戻ります…</div>'
          +'</div>'
        :'<div class="grid2">'
          +'<button class="btn-punch btn-in" '+(ci?"":"disabled")+' onclick="doPunch(\'clockIn\')">🟢<br>出　勤</button>'
          +'<button class="btn-punch btn-out" '+(co?"":"disabled")+' onclick="doPunch(\'clockOut\')">🔴<br>退　勤</button>'
          +'<button class="btn-punch btn-bs" '+(cbs?"":"disabled")+' onclick="doPunch(\'breakStart\')">☕<br>休憩開始</button>'
          +'<button class="btn-punch btn-be" '+(cbe?"":"disabled")+' onclick="doPunch(\'breakEnd\')">▶<br>休憩終了</button>'
          +'</div>'
      )
      +'<div class="history">'
      +'<div class="hist-header"><span class="hist-label">本日の打刻履歴</span>'+(worked?'<span class="hist-worked">実働 '+worked+'</span>':"")+'</div>'
      +histHTML+'</div>';
    return;
  }

  // ── PIN ──
  if(screen==="pin"){
    var dots=pinInput?'●'.repeat(pinInput.length):'<span style="color:#d1d5db">────</span>';
    app.innerHTML='<div class="center" style="padding-top:40px;margin-bottom:28px;">'
      +'<div style="font-size:1.6rem;font-weight:900;">管理者認証</div>'
      +'<div style="color:#9ca3af;font-size:.85rem;margin-top:4px;">PINを入力してください</div>'
      +'</div>'
      +'<div class="pin-display">'+dots+'</div>'
      +(!ADMIN_PIN?'<div style="color:#d97706;text-align:center;font-size:.85rem;margin-bottom:10px;">PIN読込中… しばらくお待ちください</div>':pinError?'<div style="color:#dc2626;text-align:center;font-size:.85rem;margin-bottom:10px;">PINが違います</div>':"")
      +'<div class="pin-grid">'
      +[1,2,3,4,5,6,7,8,9].map(function(n){return'<button class="btn-pin" onclick="pinTap('+n+')">'+n+'</button>';}).join("")
      +'<button class="btn-pin-clear" onclick="pinTap(\'C\')">C</button>'
      +'<button class="btn-pin" onclick="pinTap(0)">0</button>'
      +'<button class="btn-pin-enter" onclick="pinOk()">→</button>'
      +'</div>'
      +'<button class="btn-admin" style="margin-top:8px;" onclick="screen=\'home\';pinInput=\'\';render();">キャンセル</button>';
    return;
  }

  // ── スタッフ詳細 ──
  if(screen==="staffDetail"){
    var nm=selStaffDetail;
    var months2=[...new Set(records.map(function(r){return monthKey(r.timestamp);}))].sort().reverse();
    if(months2.indexOf(selMonth)<0)months2.unshift(selMonth);

    function saveTimeSelect(el){
      var id=el.dataset.id;
      var nm=el.dataset.nm;
      var type=el.dataset.type;
      var date=el.dataset.date;
      // 同じdata-id・data-typeの時・分を取得
      var allH=document.querySelectorAll(".sel-hour[data-id='"+id+"'][data-type='"+type+"']");
      var allM=document.querySelectorAll(".sel-min[data-id='"+id+"'][data-type='"+type+"']");
      if(!allH.length||!allM.length)return;
      var hv=allH[0].value,mv=allM[0].value;
      if(!hv||!mv)return;
      var newTime=hv+":"+mv;
      var parts=[parseInt(hv),parseInt(mv)];
      var d=new Date(date);d.setHours(parts[0],parts[1],0,0);
      if(id){
        var rec=records.find(function(r){return r.id===id;});
        if(rec){if(!rec.editedFrom)rec.editedFrom=rec.time;rec.time=newTime;rec.timestamp=d.toISOString();}
      } else {
        // 既存の同日同スタッフ同種別を確認
        var exist=records.find(function(r){return r.staff===nm&&r.type===type&&r.date===date&&!r.deleted;});
        if(exist){if(!exist.editedFrom)exist.editedFrom=exist.time;exist.time=newTime;exist.timestamp=d.toISOString();}
        else{records.push({id:"m"+Date.now(),staff:nm,type:type,date:date,time:newTime,timestamp:d.toISOString(),manualAdd:true});}
      }
      saveData("tc5_records",records);
    }

    function filterHrmRows(){
      var idQ=(document.getElementById("srch-id")?.value||"").toLowerCase();
      var nmQ=(document.getElementById("srch-name")?.value||"").toLowerCase();
      var lcQ=(document.getElementById("srch-loc")?.value||"").toLowerCase();
      var tpQ=(document.getElementById("srch-type")?.value||"").toLowerCase();
      var rows=document.querySelectorAll("#hrm-tbody .hrm-row");
      var shown=0;
      rows.forEach(function(tr){
        var match=(!idQ||(tr.dataset.empid||"").toLowerCase().includes(idQ))
          &&(!nmQ||tr.dataset.nm.toLowerCase().includes(nmQ))
          &&(!lcQ||(tr.dataset.loc||"").toLowerCase()===lcQ)
          &&(!tpQ||(tr.dataset.emptype||"").toLowerCase()===tpQ);
        tr.style.display=match?"":"none";
        if(match)shown++;
      });
      var c=document.getElementById("hrm-count");if(c)c.textContent=shown;
    }
    ["srch-id","srch-name"].forEach(function(id){var el=document.getElementById(id);if(el)el.oninput=filterHrmRows;});
    ["srch-loc","srch-type"].forEach(function(id){var el=document.getElementById(id);if(el)el.onchange=filterHrmRows;});
    // モーダル保存
    var modalSaveBtn=document.getElementById("btn-modal-save");

      var orig=document.getElementById("hrm-modal-orig")?.value||"";

      var fy=(document.getElementById("modal-fname-yomi")?.value||"").trim();
      if(!ln||!ly){alert("姓と姓よみは必須です");return;}
      var newN=ln+fn,newY=ly+fy;
      var empId=(document.getElementById("modal-empid")?.value||"").trim();
      var hd=document.getElementById("modal-hiredate")?.value||"";
      var loc=document.getElementById("modal-location")?.value||"";
      var dept=document.getElementById("modal-dept")?.value||"";
      var et=document.getElementById("modal-emptype")?.value||"";
      var role=document.getElementById("modal-role")?.value||"";
      var stat=document.getElementById("modal-status")?.value||"在籍";
      if(orig){
        var s=staffList.find(function(s){return s.name===orig;});
        if(!s)return;
        if(newN!==orig){
          if(staffList.find(function(x){return x.name===newN&&x!==s;})){alert("同名のスタッフが既に存在します");return;}
          records.forEach(function(r){if(r.staff===orig)r.staff=newN;});
          saveData("tc5_records",records);
          var na={};Object.keys(approvals).forEach(function(k){na[k.replace("__"+orig,"__"+newN)]=approvals[k];});
          approvals=na;saveData("tc5_approvals",approvals);
          if(staffPins[orig]){staffPins[newN]=staffPins[orig];delete staffPins[orig];saveData("tc5_pins",staffPins);}
        }
        s.lastName=ln;s.firstName=fn;s.name=newN;s.yomiLast=ly;s.yomiFirst=fy;s.yomi=newY;
        s.employeeId=empId;s.hireDate=hd;s.location=loc;s.dept=dept;s.employmentType=et;s.role=role;s.status=stat;
      } else {
        if(staffList.find(function(s){return s.name===newN;})){alert("同名のスタッフが既に存在します");return;}
        staffList.push({name:newN,lastName:ln,firstName:fn,yomiLast:ly,yomiFirst:fy,yomi:newY,employeeId:empId,hireDate:hd,location:loc,dept:dept,employmentType:et,role:role,status:stat});
      }
      saveData("tc5_staff",staffList);closeHrmModal();render();
    };
    // モーダル内IME
    function attachModalIME(nEl,yEl){
      if(!nEl||!yEl)return;var buf="";
      nEl.addEventListener("compositionupdate",function(e){if(/^[぀-ゟ゠-ヿ]+$/.test(e.data))buf=e.data;});
      nEl.addEventListener("compositionend",function(){if(buf){yEl.value=buf;buf="";}});
    }
    attachModalIME(document.getElementById("modal-lname"),document.getElementById("modal-lname-yomi"));
    attachModalIME(document.getElementById("modal-fname"),document.getElementById("modal-fname-yomi"));

    // 部門マスター

function filterCsvPreview(){
  var fid=(document.getElementById("csv-f-id")||{value:""}).value||"";
  var fnm=(document.getElementById("csv-f-name")||{value:""}).value||"";
  var floc=(document.getElementById("csv-f-loc")||{value:""}).value||"";
  var ftype=(document.getElementById("csv-f-type")||{value:""}).value||"";
  var tbody=document.getElementById("csv-prev-tbody");
  if(!tbody)return;
  var rows=tbody.querySelectorAll("tr.csv-prev-row");
  var visible=0;
  rows.forEach(function(tr){
    var show=(!fid||(tr.dataset.empid||"").includes(fid))
      &&(!fnm||(tr.dataset.nm||"").includes(fnm))
      &&(!floc||tr.dataset.loc===floc)
      &&(!ftype||tr.dataset.etype===ftype);
    tr.style.display=show?"":"none";
    if(show)visible++;
  });
  var cnt=document.getElementById("csv-prev-count");
  if(cnt)cnt.textContent="全"+rows.length+"件"+(visible<rows.length?" / 表示"+visible+"件":"");
}

  if(!modal)return;
  document.getElementById("hrm-modal-title").textContent=s?"スタッフ編集":"スタッフ追加";

  document.getElementById("modal-fname").value=s?(s.firstName||""):"";
  document.getElementById("modal-lname-yomi").value=s?(s.yomiLast!==undefined?s.yomiLast:s.yomi):"";
  document.getElementById("modal-fname-yomi").value=s?(s.yomiFirst||""):"";
  document.getElementById("modal-empid").value=s?(s.employeeId||""):"";
  document.getElementById("modal-hiredate").value=s?(s.hireDate||""):"";
  document.getElementById("modal-location").value=s?(s.location||""):"";
  document.getElementById("modal-dept").value=s?(s.dept||""):"";
  document.getElementById("modal-emptype").value=s?(s.employmentType||""):"";
  document.getElementById("modal-role").value=s?(s.role||""):"";
  document.getElementById("modal-status").value=s?(s.status||"在籍"):"在籍";

  if(pinDiv){
    pinDiv.innerHTML='<span style="color:#9ca3af;font-size:13px;">PIN</span><strong style="margin:0 8px;font-family:monospace;">'+(nm&&staffPins[nm]?staffPins[nm]:"未設定")+'</strong>';
    if(nm&&staffPins[nm]){
      var pr=document.createElement("button");
      pr.textContent="リセット";
      pr.style.cssText="background:#fff1f2;color:#e11d48;border:1px solid #fecdd3;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;";

        if(!confirm(nm+"のPINをリセットしますか？"))return;
        delete staffPins[nm];saveData("tc5_pins",staffPins);
        pinDiv.innerHTML='<span style="color:#9ca3af;font-size:13px;">PIN</span><strong style="margin:0 8px;font-family:monospace;">未設定</strong>';
      };
      pinDiv.appendChild(pr);
    }
  }
  modal.style.display="flex";
}

function doPunch(type){
  if(!tokenValid)return;
  var d=new Date();
  records.push({id:""+Date.now(),staff:staffName,type:type,date:fmtDateKey(d),time:fmtTime(d),timestamp:d.toISOString()});
  saveData("tc5_records",records);
  punchMsg=TYPE_LABEL[type]+"　"+fmtTimeSec(d);
  if(punchTimer)clearTimeout(punchTimer);
  punchTimer=setTimeout(function(){punchMsg=null;staffName=null;screen="home";render();},1500);
  render();
}

}

  if(staffPins[staffName]===String(staffPinInput)){

    staffPinError=true;staffPinInput="";render();
  }
}

function sNewTap(v){
  if(staffPinStep===1){
    if(v==="C")staffPinInput="";
    else if(staffPinInput.length<4)staffPinInput+=v;
  } else {
    if(v==="C")staffPinConfirm="";
    else if(staffPinConfirm.length<4)staffPinConfirm+=v;

function sNewOk(){
  if(staffPinStep===1){
    if(staffPinInput.length<4)return;
    staffPinStep=2;staffPinConfirm="";staffPinError=false;render();
  } else {
    if(staffPinConfirm.length<4)return;
    if(staffPinInput===staffPinConfirm){
      staffPins[staffName]=staffPinInput;
      saveData("tc5_pins",staffPins);
      staffPinError=false;screen="punch";render();
    } else {
      staffPinError=true;staffPinStep=1;staffPinInput="";staffPinConfirm="";render();
    }
  }
}
function pinTap(v){
  if(v==="C"){pinInput="";}
  else if(pinInput.length<4){pinInput+=String(v);}
  render();
  if(pinInput.length===4){setTimeout(pinOk,150);}
}
function pinOk(){
  if(!ADMIN_PIN){pinInput="";render();return;}
  if(pinInput===ADMIN_PIN){screen="admin";adminTab="records";pinInput="";pinError=false;render();}
  else{pinError=true;pinInput="";render();if(pinTimer)clearTimeout(pinTimer);pinTimer=setTimeout(function(){pinError=false;render();},1800);}
}

function dlCSV(csv,fname){
  var bom="\uFEFF";
  var blob=new Blob([bom+csv],{type:"text/csv;charset=utf-8;"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");a.href=url;a.download=fname;a.click();
  URL.revokeObjectURL(url);
}

// 時計
setInterval(function(){
  if(screen==="home"||screen==="punch"){
    var el=document.getElementById("clk");if(el)el.textContent=fmtTimeSec(new Date());
    var dt=document.getElementById("dt");if(dt)dt.textContent=fmtDate(new Date());
  }
},1000);


// まず即座にレンダリング（Firebaseを待たない）
render();

// その後Firebaseからデータを取得して再レンダリング
loadFromFirebase(function(data) {
  if(data.tc5_records){records=Array.isArray(data.tc5_records)?data.tc5_records:Object.values(data.tc5_records);localStorage.setItem("tc5_records",JSON.stringify(records));}
  if(data.tc5_staff){staffList=Array.isArray(data.tc5_staff)?data.tc5_staff:Object.values(data.tc5_staff);localStorage.setItem("tc5_staff",JSON.stringify(staffList));}
  if(data.tc5_approvals){approvals=data.tc5_approvals;localStorage.setItem("tc5_approvals",JSON.stringify(approvals));}
  if(data.tc5_pins){staffPins=data.tc5_pins;localStorage.setItem("tc5_pins",JSON.stringify(staffPins));}
  if(data.tc_master_depts){masterDepts=Array.isArray(data.tc_master_depts)?data.tc_master_depts:Object.values(data.tc_master_depts);localStorage.setItem("tc_master_depts",JSON.stringify(masterDepts));}
  if(data.tc_master_locs){masterLocs=Array.isArray(data.tc_master_locs)?data.tc_master_locs:Object.values(data.tc_master_locs);localStorage.setItem("tc_master_locs",JSON.stringify(masterLocs));}
  if(data.config && data.config.adminPin){ADMIN_PIN=data.config.adminPin;localStorage.setItem("tc_admin_pin",ADMIN_PIN);}
  listenFirebase();
  render();
});
</script>
